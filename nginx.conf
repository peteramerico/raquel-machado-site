server_tokens off;

server {
    listen 80;
    server_name raquelmachadoped.com.br www.raquelmachadoped.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name raquelmachadoped.com.br www.raquelmachadoped.com.br;

    ssl_certificate /etc/letsencrypt/live/raquelmachadoped.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raquelmachadoped.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/raquelmachadoped;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
